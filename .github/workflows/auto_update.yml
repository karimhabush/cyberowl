name: auto_update_cron_job

on:
  schedule:
    - cron: '0 15 * * *'  # Runs daily at 15:00 UTC
  workflow_dispatch:

jobs:
  run-and-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-venv-
      - run: python -m pip install poetry
      - run: python -m poetry config virtualenvs.in-project true && python -m poetry install
      - name: Set up Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - run: python -m poetry run python src/cyberowl/main.py
      - name: Setup git config
        run: |
          git config user.name "CyberOwl AI Bot"
          git config user.email "<>"
      - name: Commit
        run: |
          git add docs/
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "Automatic update with GitHub Actions"
            git push origin ${GITHUB_REF##*/}
          fi

  deploy:
    needs: run-and-commit
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build
        env:
          GA_ID: ${{ secrets.GA_ID }}
        run: npm run docs:build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Deploy to S3
        run: aws s3 sync ./docs/.vuepress/dist s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete
